validation_checklist:
  - id: "timing"
    item: "时点检查：使用的是最新完整年度年报（非中报/季报）"
    checked: true
    
  - id: "unit"
    item: "单位检查：确认所有数字单位（亿/万/千元）正确无误"
    checked: true
    
  - id: "subject"
    item: "科目检查：现金≠受限存款，借款≠总负债，区分有息/无息负债"
    checked: true
    
  - id: "calculation"
    item: "计算检查：手工复核净现金、FCF等计算正确"
    checked: true
    
  - id: "variance"
    item: "对比检查：与上期数据对比，变动>30%有合理解释"
    checked: true
    variance_explanation: "现金同比+32.4%，因经营现金流改善"
    
  - id: "source"
    item: "来源检查：所有数据标注年报页码/附注编号"
    checked: true
    
  - id: "cross_check"
    item: "交叉验证：利息率、现金/市值比例在合理范围"
    checked: true

